<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <title>みんなの旅しおり</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <!-- グループ認証セクション -->
    <section id="groupAuthSection">
      <section class="hero">
        <p class="eyebrow">グループ旅行の準備帳</p>
        <h1>みんなの旅しおり</h1>
        <p class="hero-text">そのまま旅行の決まったことをまとめられます。</p>
      </section>

      <div class="auth-box">
        <h3>グループにログイン</h3>
        
        <!-- タブナビゲーション -->
        <div class="tab-navigation">
          <button id="authTabCreate" class="tab-button active">新規グループ作成</button>
          <button id="authTabJoin" class="tab-button">既存グループに参加</button>
        </div>

        <!-- グループ作成パネル -->
        <div id="authCreatePanel" class="auth-panel visible">
          <label for="createGroupName">グループ名</label>
          <input id="createGroupName" type="text" placeholder="例: 夏休み旅行メンバー">
          
          <label for="createGroupSecret">合言葉</label>
          <input id="createGroupSecret" type="password" placeholder="グループのパスワード">
          
          <button id="createGroupButton" type="button">新規グループ作成</button>
          <div id="createGroupMessage" class="message"></div>
        </div>

        <!-- グループ参加パネル -->
        <div id="authJoinPanel" class="auth-panel">
          <label for="joinGroupId">グループID</label>
          <input id="joinGroupId" type="text" placeholder="例: grp-XXXXX">
          
          <label for="joinGroupSecret">合言葉</label>
          <input id="joinGroupSecret" type="password" placeholder="グループのパスワード">
          
          <button id="joinGroupButton" type="button">グループに参加</button>
          <div id="joinGroupMessage" class="message"></div>
        </div>
      </div>
    </section>

    <!-- アプリケーション表示セクション -->
    <div id="appSection" class="hidden">
      <div id="groupSessionBar" class="group-session-bar">
        <span id="groupSessionInfo"></span>
        <button id="logoutButton" type="button">ログアウト</button>
      </div>

      <section class="card" aria-live="polite">
        <div class="member-header">
          <div>
            <h2>旅行をまとめる</h2>
            <p class="card-text">決まった行き先、資料をここに入れます。</p>
          </div>
        </div>

        <div class="member-layout">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h3>旅行一覧</h3>
                <p class="panel-text">登録した旅行だけを表示します。</p>
              </div>
              <button id="showTripFormButton" type="button">新しい旅行を作る</button>
            </div>

            <div id="tripFormSection" class="trip-form hidden">
              <h3>新しい旅行を作る</h3>
              <p class="panel-text">決まった内容だけを先に入れられます。</p>

              <label for="tripTitle">旅行名</label>
              <input id="tripTitle" type="text" placeholder="たとえば 夏の大阪旅行">

              <label for="tripDestination">行き先</label>
              <input id="tripDestination" type="text" placeholder="たとえば 大阪">

              <div class="form-grid">
                <div>
                  <label for="tripStartDate">開始日</label>
                  <input id="tripStartDate" type="date">
                </div>
                <div>
                  <label for="tripEndDate">終了日</label>
                  <input id="tripEndDate" type="date">
                </div>
              </div>

              <label for="tripMeetingPlace">集合場所</label>
              <input id="tripMeetingPlace" type="text" placeholder="たとえば 新大阪駅 東口">

              <label for="tripMeetingTime">集合時間</label>
              <input id="tripMeetingTime" type="time">

              <label for="tripImportantNote">大事なメモ</label>
              <textarea id="tripImportantNote" placeholder="持ち物や注意点を書けます"></textarea>

              <button id="saveTripButton" type="button">保存する</button>
              <button id="cancelTripFormButton" type="button">やめる</button>
              <div id="tripFormMessage" class="message"></div>
            </div>

            <div id="tripListMessage" class="message"></div>
            <div id="tripList"></div>
          </section>

          <section class="panel">
            <div id="tripDetailEmpty" class="empty-state">
              <p>左から旅行を選んでください</p>
            </div>

            <div id="tripDetailSection" class="hidden detail-panel">
              <div class="panel-header">
                <button id="backButton" type="button">← 戻る</button>
              </div>

              <div class="detail-box">
                <h3 id="detailTitle"></h3>
                <p class="panel-text"><strong>行き先:</strong> <span id="detailDestination"></span></p>
                <p class="panel-text"><strong>開始日:</strong> <span id="detailStartDate"></span></p>
                <p class="panel-text"><strong>終了日:</strong> <span id="detailEndDate"></span></p>
                <p class="panel-text"><strong>集合場所:</strong> <span id="detailMeetingPlace"></span></p>
                <p class="panel-text"><strong>集合時間:</strong> <span id="detailMeetingTime"></span></p>
                <p class="panel-text"><strong>大事なメモ:</strong> <span id="detailImportantNote"></span></p>
              </div>

              <div class="tab-row" role="tablist" aria-label="旅行の情報タブ">
                <button class="tab-button active" data-tab="places" type="button">行き先</button>
                <button class="tab-button" data-tab="documents" type="button">スクショ・メモ</button>
              </div>

              <div id="tabContent" class="tab-content"></div>
            </div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <div id="imagePreviewModal" class="image-modal hidden" aria-hidden="true">
    <div class="image-modal-backdrop" data-action="close-image-modal"></div>
    <div class="image-modal-panel" role="dialog" aria-modal="true" aria-label="画像プレビュー">
      <button id="closeImageModalButton" type="button" class="image-modal-close secondary-button">閉じる</button>
      <img id="imagePreview" alt="画像プレビュー">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
